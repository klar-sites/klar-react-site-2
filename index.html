<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vårdkliniken Norden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/history@5.3.0/umd/history.production.min.js"></script>
    <script src="https://unpkg.com/react-router@5.3.4/umd/react-router.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
    <style>
      :root {
        --vkn-bg: #f6f4ef;
        --vkn-surface: #ffffff;
        --vkn-ink: #232a28;
        --vkn-muted: #6a716e;
        --vkn-accent: #3f7d6e;
        --vkn-accent-dark: #2f5f53;
        --vkn-accent-soft: #e6efeb;
        --vkn-border: #e7e3da;
        --vkn-radius: 20px;
        --vkn-radius-sm: 12px;
        --vkn-shadow: 0 18px 40px -28px rgba(35, 42, 40, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--vkn-bg);
        color: var(--vkn-ink);
        font-family: 'Inter', system-ui, sans-serif;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }

      .vkn-app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .vkn-wrap {
        width: 100%;
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 24px;
      }

      h1,
      h2,
      h3 {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 500;
        line-height: 1.15;
        margin: 0;
        letter-spacing: -0.01em;
      }

      p {
        margin: 0 0 1rem;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* Header */
      .vkn-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(246, 244, 239, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--vkn-border);
      }

      .vkn-header__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 76px;
      }

      .vkn-logo {
        display: flex;
        align-items: center;
        gap: 11px;
        font-family: 'Fraunces', serif;
        font-size: 1.22rem;
        font-weight: 600;
        color: var(--vkn-ink);
      }

      .vkn-logo__mark {
        width: 36px;
        height: 36px;
        border-radius: 11px;
        background: var(--vkn-accent);
        display: grid;
        place-items: center;
        color: #fff;
      }

      .vkn-nav {
        display: flex;
        gap: 6px;
      }

      .vkn-nav a {
        padding: 9px 16px;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--vkn-muted);
        transition: .2s;
      }

      .vkn-nav a:hover {
        color: var(--vkn-ink);
      }

      .vkn-nav a.vkn-nav--active {
        background: var(--vkn-accent-soft);
        color: var(--vkn-accent-dark);
      }

      .vkn-burger {
        display: none;
        background: none;
        border: 1px solid var(--vkn-border);
        border-radius: 10px;
        width: 42px;
        height: 42px;
        cursor: pointer;
      }

      .vkn-burger span {
        display: block;
        width: 18px;
        height: 2px;
        background: var(--vkn-ink);
        margin: 3px auto;
      }

      /* Buttons */
      .vkn-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 26px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.97rem;
        cursor: pointer;
        border: 1px solid transparent;
        transition: .2s;
      }

      .vkn-btn--primary {
        background: var(--vkn-accent);
        color: #fff;
      }

      .vkn-btn--primary:hover {
        background: var(--vkn-accent-dark);
      }

      .vkn-btn--ghost {
        background: transparent;
        color: var(--vkn-ink);
        border-color: var(--vkn-border);
      }

      .vkn-btn--ghost:hover {
        border-color: var(--vkn-ink);
      }

      .vkn-btn--light {
        background: #fff;
        color: var(--vkn-accent-dark);
      }

      .vkn-btn--light:hover {
        background: var(--vkn-accent-soft);
      }

      .vkn-eyebrow {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--vkn-accent);
        margin-bottom: 16px;
      }

      /* Hero */
      .vkn-hero {
        padding: 80px 0 60px;
      }

      .vkn-hero__grid {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 56px;
        align-items: center;
      }

      .vkn-hero h1 {
        font-size: clamp(2.4rem, 5vw, 3.5rem);
        margin-bottom: 22px;
      }

      .vkn-hero__intro {
        font-size: 1.12rem;
        color: var(--vkn-muted);
        max-width: 30rem;
        margin-bottom: 30px;
      }

      .vkn-hero__actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .vkn-hero__img {
        border-radius: var(--vkn-radius);
        overflow: hidden;
        box-shadow: var(--vkn-shadow);
      }

      .vkn-hero__img img {
        width: 100%;
        height: 480px;
        object-fit: cover;
        display: block;
      }

      /* Trust strip */
      .vkn-trust {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        padding: 34px;
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius);
        margin-bottom: 30px;
      }

      .vkn-trust__item {
        text-align: center;
      }

      .vkn-trust__num {
        font-family: 'Fraunces', serif;
        font-size: 1.5rem;
        color: var(--vkn-accent-dark);
      }

      .vkn-trust__label {
        font-size: 0.92rem;
        color: var(--vkn-muted);
      }

      /* Section */
      .vkn-section {
        padding: 64px 0;
      }

      .vkn-section__head {
        max-width: 38rem;
        margin-bottom: 40px;
      }

      .vkn-section__head h2 {
        font-size: clamp(1.9rem, 3.5vw, 2.5rem);
        margin-bottom: 16px;
      }

      .vkn-section__head p {
        color: var(--vkn-muted);
        font-size: 1.05rem;
      }

      .vkn-section__head--center {
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }

      /* Treatment cards */
      .vkn-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
      }

      .vkn-card {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: .25s;
      }

      .vkn-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--vkn-shadow);
      }

      .vkn-card__img img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        display: block;
      }

      .vkn-card__body {
        padding: 24px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .vkn-card__body h3 {
        font-size: 1.3rem;
        margin-bottom: 10px;
      }

      .vkn-card__body p {
        color: var(--vkn-muted);
        font-size: 0.97rem;
        flex: 1;
      }

      .vkn-card__meta {
        display: flex;
        gap: 18px;
        margin-top: 14px;
        padding-top: 16px;
        border-top: 1px solid var(--vkn-border);
        font-size: 0.92rem;
      }

      .vkn-card__price {
        font-weight: 600;
        color: var(--vkn-accent-dark);
      }

      .vkn-card__dur {
        color: var(--vkn-muted);
      }

      .vkn-more {
        margin-top: 36px;
        text-align: center;
      }

      .vkn-more a {
        color: var(--vkn-accent-dark);
        font-weight: 600;
        border-bottom: 2px solid var(--vkn-accent-soft);
        padding-bottom: 3px;
      }

      .vkn-more a:hover {
        border-color: var(--vkn-accent);
      }

      /* CTA banner */
      .vkn-cta {
        background: var(--vkn-accent);
        color: #fff;
        border-radius: var(--vkn-radius);
        padding: 56px;
        text-align: center;
      }

      .vkn-cta h2 {
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        margin-bottom: 14px;
        color: #fff;
      }

      .vkn-cta p {
        color: rgba(255, 255, 255, 0.85);
        max-width: 34rem;
        margin: 0 auto 28px;
      }

      /* Page header */
      .vkn-pagehead {
        padding: 70px 0 24px;
        max-width: 42rem;
      }

      .vkn-pagehead h1 {
        font-size: clamp(2.2rem, 4.5vw, 3rem);
        margin-bottom: 18px;
      }

      .vkn-pagehead p {
        color: var(--vkn-muted);
        font-size: 1.1rem;
      }

      /* About */
      .vkn-about {
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 50px;
        align-items: center;
      }

      .vkn-about__img {
        border-radius: var(--vkn-radius);
        overflow: hidden;
        box-shadow: var(--vkn-shadow);
      }

      .vkn-about__img img {
        width: 100%;
        height: 440px;
        object-fit: cover;
        display: block;
      }

      .vkn-about__text h2 {
        font-size: clamp(1.8rem, 3vw, 2.3rem);
        margin-bottom: 20px;
      }

      .vkn-about__text p {
        color: var(--vkn-muted);
      }

      /* Stats */
      .vkn-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
      }

      .vkn-stat {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius);
        padding: 38px 28px;
        text-align: center;
      }

      .vkn-stat__num {
        font-family: 'Fraunces', serif;
        font-size: 2.6rem;
        color: var(--vkn-accent-dark);
        line-height: 1;
      }

      .vkn-stat__label {
        color: var(--vkn-muted);
        margin-top: 10px;
      }

      /* Team */
      .vkn-team {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
      }

      .vkn-member {
        text-align: center;
      }

      .vkn-member__img {
        border-radius: var(--vkn-radius);
        overflow: hidden;
        margin-bottom: 16px;
      }

      .vkn-member__img img {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
      }

      .vkn-member h3 {
        font-size: 1.2rem;
        margin-bottom: 4px;
      }

      .vkn-member__role {
        color: var(--vkn-accent-dark);
        font-size: 0.95rem;
        font-weight: 500;
      }

      /* Contact */
      .vkn-contact-grid {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 44px;
        align-items: start;
      }

      .vkn-info {
        display: grid;
        gap: 16px;
      }

      .vkn-info__card {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius-sm);
        padding: 22px 24px;
      }

      .vkn-info__card h3 {
        font-family: 'Inter', sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--vkn-accent);
        margin-bottom: 6px;
      }

      .vkn-info__card p {
        margin: 0;
        color: var(--vkn-ink);
      }

      .vkn-form {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius);
        padding: 34px;
      }

      .vkn-form label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 7px;
      }

      .vkn-field {
        margin-bottom: 20px;
      }

      .vkn-form input,
      .vkn-form textarea {
        width: 100%;
        padding: 13px 16px;
        border: 1px solid var(--vkn-border);
        border-radius: var(--vkn-radius-sm);
        font-family: inherit;
        font-size: 0.97rem;
        background: var(--vkn-bg);
        color: var(--vkn-ink);
        resize: vertical;
      }

      .vkn-form input:focus,
      .vkn-form textarea:focus {
        outline: none;
        border-color: var(--vkn-accent);
      }

      .vkn-form__sent {
        color: var(--vkn-accent-dark);
        font-weight: 600;
        margin-top: 14px;
      }

      /* Footer */
      .vkn-footer {
        margin-top: auto;
        border-top: 1px solid var(--vkn-border);
        padding: 46px 0 30px;
      }

      .vkn-footer__top {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 30px;
      }

      .vkn-footer__nav {
        display: flex;
        gap: 22px;
        flex-wrap: wrap;
      }

      .vkn-footer__nav a {
        color: var(--vkn-muted);
        font-size: 0.95rem;
      }

      .vkn-footer__nav a:hover {
        color: var(--vkn-ink);
      }

      .vkn-footer__bottom {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--vkn-border);
        color: var(--vkn-muted);
        font-size: 0.88rem;
      }

      @media (max-width: 900px) {

        .vkn-hero__grid,
        .vkn-about,
        .vkn-contact-grid {
          grid-template-columns: 1fr;
        }

        .vkn-hero__img img,
        .vkn-about__img img {
          height: 340px;
        }

        .vkn-trust {
          grid-template-columns: repeat(2, 1fr);
        }

        .vkn-cards,
        .vkn-stats,
        .vkn-team {
          grid-template-columns: 1fr;
        }

        .vkn-nav {
          display: none;
        }

        .vkn-nav--open {
          display: flex;
          position: absolute;
          top: 76px;
          left: 0;
          right: 0;
          flex-direction: column;
          background: var(--vkn-bg);
          padding: 14px 24px;
          border-bottom: 1px solid var(--vkn-border);
        }

        .vkn-burger {
          display: block;
        }

        .vkn-cta {
          padding: 40px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
const { MemoryRouter, BrowserRouter, Routes, Route, Link, NavLink, useLocation } = ReactRouterDOM;

const PROJECT_ID = 476;
const KLAR_ROUTE_KEY = "klar:spa-route:" + window.__KLAR_PROJECT_ID__;
function readStoredRoute(){ try { return localStorage.getItem(KLAR_ROUTE_KEY) || "/"; } catch (e) { return "/"; } }

/* ---- Klar content client ---- */
let klarClient = null;
async function getClient() {
  if (klarClient) return klarClient;
  try {
    const mod = await import('https://editor.klar.website/sdk/v1/content.js');
    klarClient = mod.createKlarClient({ projectId: PROJECT_ID });
  } catch (e) { klarClient = null; }
  return klarClient;
}
function usePageContent(file) {
  const [content, setContent] = useState(null);
  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const c = await getClient();
        if (!c) return;
        const data = await c.page(file);
        if (alive) setContent(data || {});
      } catch (e) { if (alive) setContent({}); }
    })();
    return () => { alive = false; };
  }, [file]);
  return content || {};
}

/* ---- Helpers ---- */
const txt = (v, fb) => (v == null || v === "" ? fb : v);
const img = (v, fb) => ({ src: (v && v.src) || fb.src, alt: (v && v.alt) || fb.alt });
const lnk = (v, fb) => ({ href: (v && v.href) || fb.href, text: (v && v.text) || fb.text });

function Repeat({ items, fallback, children }) {
  if (items && Array.isArray(items) && items.length && items.some(i => i && i.html)) {
    return <React.Fragment>
      {items.map((it, i) => <div key={i} dangerouslySetInnerHTML={{ __html: it.html }} />)}
    </React.Fragment>;
  }
  return <React.Fragment>{children}</React.Fragment>;
}

/* ---- Header & Footer (chrome, not editable) ---- */
function Header() {
  const [open, setOpen] = useState(false);
  const nav = [
    ["/", "Hem"], ["/behandlingar", "Behandlingar"], ["/om-oss", "Om oss"], ["/kontakt", "Kontakt"]
  ];
  return (
    <header className="vkn-header">
      <div className="vkn-wrap vkn-header__inner">
        <Link to="/" className="vkn-logo">
          <span className="vkn-logo__mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.6-9.3-9.2C1.3 8.9 2.7 5.5 6 5.5c2 0 3.2 1.2 4 2.4.8-1.2 2-2.4 4-2.4 3.3 0 4.7 3.4 3.3 6.3C19 16.4 12 21 12 21Z" stroke="#fff" strokeWidth="1.6" strokeLinejoin="round"/></svg>
          </span>
          Vårdkliniken Norden
        </Link>
        <button className="vkn-burger" onClick={() => setOpen(o => !o)} aria-label="Meny"><span></span><span></span><span></span></button>
        <nav className={"vkn-nav" + (open ? " vkn-nav--open" : "")}>
          {nav.map(([to, label]) => (
            <NavLink key={to} to={to} end={to === "/"} onClick={() => setOpen(false)}
              className={({isActive}) => isActive ? "vkn-nav--active" : ""}>{label}</NavLink>
          ))}
        </nav>
      </div>
    </header>
  );
}
function Footer() {
  return (
    <footer className="vkn-footer">
      <div className="vkn-wrap">
        <div className="vkn-footer__top">
          <div className="vkn-logo">
            <span className="vkn-logo__mark">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.6-9.3-9.2C1.3 8.9 2.7 5.5 6 5.5c2 0 3.2 1.2 4 2.4.8-1.2 2-2.4 4-2.4 3.3 0 4.7 3.4 3.3 6.3C19 16.4 12 21 12 21Z" stroke="#fff" strokeWidth="1.6" strokeLinejoin="round"/></svg>
            </span>
            Vårdkliniken Norden
          </div>
          <nav className="vkn-footer__nav">
            <Link to="/">Hem</Link>
            <Link to="/behandlingar">Behandlingar</Link>
            <Link to="/om-oss">Om oss</Link>
            <Link to="/kontakt">Kontakt</Link>
          </nav>
        </div>
        <div className="vkn-footer__bottom">
          © {new Date().getFullYear()} Vårdkliniken Norden · Sveavägen 42, 113 59 Stockholm · 08-123 45 67
        </div>
      </div>
    </footer>
  );
}

/* ---- CTA banner (shared) ---- */
function CtaBanner({ c, prefix }) {
  const head = prefix + "CtaHeading", text = prefix + "CtaText", btn = prefix + "CtaBtn";
  const cta = lnk(c[btn], { href: "/kontakt", text: "Boka tid" });
  return (
    <section className="vkn-section">
      <div className="vkn-wrap">
        <div className="vkn-cta">
          <h2 className={prefix + "-cta-heading"}>{txt(c[head], "Redo att ta hand om din hälsa?")}</h2>
          <p className={prefix + "-cta-text"}>{txt(c[text], "Boka en tid hos oss idag. Våra legitimerade specialister finns här för dig – med korta väntetider och personlig omsorg.")}</p>
          <Link to={cta.href} className={prefix + "-cta-btn vkn-btn vkn-btn--light"}>{cta.text}</Link>
        </div>
      </div>
    </section>
  );
}

/* ---- Treatment card ---- */
function TreatmentCard({ image, title, desc, price, dur }) {
  return (
    <article className="vkn-card vkn-treatment-card">
      <div className="vkn-card__img"><img src={image.src} alt={image.alt} /></div>
      <div className="vkn-card__body">
        <h3>{title}</h3>
        <p>{desc}</p>
        <div className="vkn-card__meta">
          <span className="vkn-card__price">{price}</span>
          <span className="vkn-card__dur">{dur}</span>
        </div>
      </div>
    </article>
  );
}

/* ---- HOME ---- */
function Home() {
  const c = usePageContent("index.html");
  const hero = img(c.heroImage, { src: "https://images.unsplash.com/photo-1631217868264-e5b90bb7e133?auto=format&fit=crop&w=1600&q=80", alt: "Lugn och modern klinikmiljö" });
  const b1 = lnk(c.heroPrimaryBtn, { href: "/kontakt", text: "Boka tid" });
  const b2 = lnk(c.heroSecondaryBtn, { href: "/behandlingar", text: "Se behandlingar" });
  return (
    <main>
      <section className="vkn-hero">
        <div className="vkn-wrap vkn-hero__grid">
          <div>

/* ---- Route reporter ---- */
function RouteReporter() {
  const location = useLocation();
  useEffect(() => {
    if (window.__KLAR_CDN) {
      try { window.parent.postMessage({ type: "klar-route", route: location.pathname }, "*"); } catch (e) {}
      try { localStorage.setItem(KLAR_ROUTE_KEY, location.pathname); } catch (e) {}
    }
    window.scrollTo(0, 0);
  }, [location.pathname]);
  return null;
}

function App() {
  return (
    <div className="vkn-app">
      <RouteReporter />
      <Header />
      <Routes>
        <Route path="/" element={<Home />} />
        <Route path="/behandlingar" element={<Behandlingar />} />
        <Route path="/om-oss" element={<OmOss />} />
        <Route path="/kontakt" element={<Kontakt />} />
      </Routes>
      <Footer />
    </div>
  );
}

const Router = window.__KLAR_CDN ? MemoryRouter : BrowserRouter;
ReactDOM.createRoot(document.getElementById("root")).render(
  <Router basename={window.__KLAR_BASE || undefined} {...(window.__KLAR_CDN ? { initialEntries: [readStoredRoute()] } : {})}>
    <App />
  </Router>
);
</script>
